; 中文文件说明：本文件配置 PlatformIO 构建环境、分区、脚本和核心亲和性；PlatformIO key/value 名称保持 English。
[platformio]
; 中文：默认构建 RMT+DMA 后端（主收益固件，抗 Wi-Fi 乱码；与 run_rinachan_unifont
; 脚本的默认 env 一致）。Adafruit baseline 回退：pio run -e esp32s3
default_envs = esp32s3-rmt-dma

[env:esp32s3]
; 中文块：锁定到 pioarduino 社区 fork，Arduino-esp32 3.3.9 / ESP-IDF 5.5.4。
; 官方 platformio/espressif32 长期停留在 Arduino 2.0.x(IDF 4.4)，没有新 RMT
; 驱动 (driver/rmt_tx.h)，无法编译 esp32s3-rmt / esp32s3-rmt-dma 后端。
; pioarduino 55.03.39 提供 IDF 5.x 新 RMT TX 驱动 + DMA 支持。
; 升级版本时改这里的 tag 即可：https://github.com/pioarduino/platform-espressif32/releases
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
; 中文块：PSRAM 类型必须匹配实际 ESP32-S3 模组；当前板载 8MB embedded
; PSRAM 需要 OPI 模式，否则启动时会报 PSRAM ID read error。
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi

lib_deps =
    bblanchon/ArduinoJson@^6.21.5
    adafruit/Adafruit NeoPixel@^1.12.3

extra_scripts =
    pre:scripts/patch_webserver_timeout.py
    scripts/gzip_webui_assets.py

build_unflags =
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D RINACHAN_AP_ONLY=1
    ; 中文块：Core affinity 固定 WebServer/HTTP、按钮、电源和帧队列在 Core 0，
    ; 把 Core 1 留给 LED render/scroll task，避免网络负载破坏 WS2812/RMT 时序。
    -D ARDUINO_RUNNING_CORE=0
    -D ARDUINO_EVENT_RUNNING_CORE=0
    ; 中文块：HTTP timeout 是 WebServer.h patch 的第二层保险，防止断开的客户端
    ; 长时间卡住主循环和文字滚动刷新。
    -D HTTP_MAX_DATA_WAIT=200
    -D HTTP_MAX_POST_WAIT=200
    -D HTTP_MAX_SEND_WAIT=200
    ; Serial diagnostics / test console feature gates. Enabled by default (the
    ; feature is additive + non-blocking); set any to 0 for a stripped image.
    -D ENABLE_SERIAL_DIAGNOSTICS=1
    -D ENABLE_SERIAL_CONSOLE=1
    -D ENABLE_SERIAL_UART0_MIRROR=1

; Verbose diagnostics test build: identical to esp32s3 plus chatty LOGV logs
; (RINACHAN_VERBOSE_LOGS). Flash with: pio run -e esp32s3-test -t upload
[env:esp32s3-test]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -D RINACHAN_VERBOSE_LOGS=1

; 中文块：LED 后端迁移测试固件。默认 env:esp32s3 仍用 Adafruit_NeoPixel 作为
; baseline / 安全回退。下面两个 env 把物理传输后端换成 ESP-IDF 新 RMT 驱动：
;   esp32s3-rmt      -> RMT 不开 DMA，用于验证 API/颜色顺序/亮度/映射；
;   esp32s3-rmt-dma  -> RMT + DMA，主收益固件（ESP32-S3 支持）。
; Flash with: pio run -e esp32s3-rmt-dma -t upload
; 需要 Arduino-esp32 3.x (ESP-IDF 5.x) 才有新 RMT 驱动 (driver/rmt_tx.h)。
[env:esp32s3-rmt]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -D RINACHAN_LED_BACKEND=1
    -D RINACHAN_LED_RMT_WITH_DMA=0

[env:esp32s3-rmt-dma]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -D RINACHAN_LED_BACKEND=1
    -D RINACHAN_LED_RMT_WITH_DMA=1
