[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
; Change these two lines to psram_type=opi and memory_type=qio_opi
; if the installed ESP32-S3 module uses OPI PSRAM instead of QSPI PSRAM.
board_build.psram_type = qspi
board_build.arduino.memory_type = qio_qspi

lib_deps =
    bblanchon/ArduinoJson@^6.21.5
    adafruit/Adafruit NeoPixel@^1.12.3

extra_scripts =
    pre:scripts/patch_webserver_timeout.py
    scripts/gzip_webui_assets.py

build_unflags =
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D RINACHAN_AP_ONLY=1
    ; --- Core affinity (do NOT remove) ---------------------------------------
    ; Pin the Arduino loopTask (WebServer/HTTP, buttons, power, frame queue) and
    ; the Arduino event task to Core 0 so they sit alongside the WiFi stack.
    ; This leaves Core 1 EXCLUSIVELY for the LED render/scroll task
    ; (LED_RENDER_TASK_CORE = 1 in config.h). Without these flags arduino-esp32
    ; defaults loopTask to Core 1, where heavy HTTP work collides with the
    ; timing-critical WS2812/RMT transmit and produces occasional garbled /
    ; torn / stuttering frames during fast refresh and text scrolling.
    -D ARDUINO_RUNNING_CORE=0
    -D ARDUINO_EVENT_RUNNING_CORE=0
    ; WebServer TCP connection timeouts – patched in WebServer.h by
    ; scripts/patch_webserver_timeout.py (pre-build script).
    ; Values here act as a second layer in case the patch is ever reverted.
    -D HTTP_MAX_DATA_WAIT=200
    -D HTTP_MAX_POST_WAIT=200
    -D HTTP_MAX_SEND_WAIT=200
