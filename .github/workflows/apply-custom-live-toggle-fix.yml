name: Apply custom live toggle fix

# One-shot workflow used to patch app.js and delete itself.
on:
  push:
    paths:
      - ".github/workflows/apply-custom-live-toggle-fix.yml"

permissions:
  contents: write

jobs:
  patch-app-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch realtime toggle behavior
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app = Path("esp32s3_firmware/data/app.js")
          workflow = Path(".github/workflows/apply-custom-live-toggle-fix.yml")
          text = app.read_text(encoding="utf-8")

          old = '''function setLiveSendEnabled(enabled, label = "实时发送") {
  const next = !!enabled;
  if (liveSendEnabled === next) {
    updateLiveToggles();
    if (liveSendEnabled) syncLiveSendBaseline(currentFrame);
    return;
  }
  liveSendEnabled = next;
  if (liveSendEnabled) syncLiveSendBaseline(currentFrame);
  updateLiveToggles();
  log(`${label} ${liveSendEnabled ? "开启" : "关闭"}`);
}
'''

          new = '''function setLiveSendEnabled(enabled, label = "实时发送") {
  const next = !!enabled;
  const wasEnabled = liveSendEnabled;
  if (liveSendEnabled === next) {
    updateLiveToggles();
    if (liveSendEnabled) syncLiveSendBaseline(currentFrame);
    return;
  }
  liveSendEnabled = next;
  if (liveSendEnabled) syncLiveSendBaseline(currentFrame);
  updateLiveToggles();
  log(`${label} ${liveSendEnabled ? "开启" : "关闭"}`);

  // 6.2 custom page: when realtime is re-enabled, immediately send the current editor frame.
  if (!wasEnabled && liveSendEnabled && document.body?.dataset?.page === "custom") {
    sendCustomFrame("custom_live_enable_send", true);
  }
}
'''

          if new in text:
              print("Patch already present.")
          elif old in text:
              app.write_text(text.replace(old, new, 1), encoding="utf-8")
              print("Patched esp32s3_firmware/data/app.js")
          else:
              raise SystemExit("Target setLiveSendEnabled block not found; refusing to modify app.js")

          if workflow.exists():
              workflow.unlink()
              print("Removed one-shot workflow")
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add esp32s3_firmware/data/app.js .github/workflows/apply-custom-live-toggle-fix.yml
          git diff --cached --quiet && exit 0
          git commit -m "Fix custom realtime toggle send" -m "When 6.2 custom realtime mode is re-enabled, immediately send the current editor frame. [skip ci]"
          git push
